<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积极分子政治理论考试 · 复习系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c0392b;--red-deep:#922b21;--red-light:#f5cac3;--gold:#d4a017;--gold-light:#fef3cd;--bg:#faf8f5;--bg2:#f2ede6;--text:#2c1810;--text-mute:#7b6050;--border:#e0d5c5;--correct:#27ae60;--wrong:#e74c3c;--card:#ffffff;--shadow:0 2px 16px rgba(44,24,16,0.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,var(--red-deep) 0%,var(--red) 60%,#e74c3c 100%);color:white;padding:24px 24px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(192,57,43,0.4);}
.header-inner{max-width:900px;margin:0 auto;}
.header-title{font-family:'Noto Serif SC',serif;font-size:21px;font-weight:700;letter-spacing:3px;margin-bottom:14px;}
.header-title span{color:var(--gold);}
.mode-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.mode-btn{padding:7px 20px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);background:transparent;color:rgba(255,255,255,0.85);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.2s;font-weight:500;}
.mode-btn.active{background:white;color:var(--red);border-color:white;font-weight:700;}
.mode-btn:hover:not(.active){background:rgba(255,255,255,0.15);color:white;}
.tab-row{display:flex;gap:0;border-bottom:2px solid var(--border);background:var(--card);position:sticky;top:108px;z-index:90;overflow-x:auto;}
.tab-btn{padding:14px 20px;border:none;background:transparent;color:var(--text-mute);font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-weight:500;}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}
.tab-btn:hover:not(.active){color:var(--text);background:var(--bg2);}
main{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
.section-header{display:flex;align-items:center;gap:10px;margin:32px 0 16px;}
.section-badge{background:var(--red);color:white;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:700;padding:4px 14px;border-radius:4px;letter-spacing:2px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
.q-card:hover{box-shadow:0 4px 24px rgba(44,24,16,0.12);}
.q-num{display:inline-block;background:var(--red);color:white;font-size:12px;font-weight:700;padding:2px 9px;border-radius:4px;margin-bottom:10px;letter-spacing:1px;}
.q-text{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:14px;font-weight:500;}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.opt-label{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.18s;font-size:14px;line-height:1.6;color:var(--text);}
.opt-label:hover{border-color:var(--red);background:#fff5f5;}
.opt-label input{margin-top:3px;accent-color:var(--red);flex-shrink:0;}
.opt-label.correct{border-color:var(--correct);background:#eafaf1;}
.opt-label.wrong{border-color:var(--wrong);background:#fdf2f2;}
.opt-key{font-weight:700;color:var(--red);flex-shrink:0;}
.answer-box{background:var(--gold-light);border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:8px;font-size:14px;line-height:1.8;}
.answer-box.hidden{display:none;}
.answer-label{font-weight:700;color:var(--red-deep);margin-bottom:4px;font-size:13px;}
.answer-text{color:var(--text);}
.analysis-text{color:var(--text-mute);margin-top:4px;font-size:13px;}
.toggle-answer-btn{display:inline-block;margin-top:8px;padding:5px 14px;border-radius:5px;border:1.5px solid var(--gold);background:white;color:var(--gold);font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.toggle-answer-btn:hover{background:var(--gold);color:white;}
.tf-options{display:flex;gap:12px;margin-bottom:12px;}
.tf-btn{padding:8px 24px;border-radius:6px;border:1.5px solid var(--border);background:white;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.18s;}
.tf-btn:hover{border-color:var(--red);background:#fff5f5;}
.tf-btn.selected-t{border-color:var(--correct);background:#eafaf1;color:var(--correct);font-weight:700;}
.tf-btn.selected-f{border-color:var(--wrong);background:#fdf2f2;color:var(--wrong);font-weight:700;}
.tf-btn.correct{border-color:var(--correct);background:#eafaf1;}
.tf-btn.wrong-sel{border-color:var(--wrong);background:#fdf2f2;}
.fill-input{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);outline:none;margin-bottom:8px;transition:border-color 0.2s;resize:vertical;}
.fill-input:focus{border-color:var(--red);}
.result-mark{display:inline-block;font-size:18px;margin-right:6px;}
.submit-section{display:flex;justify-content:center;margin:32px 0 16px;}
.submit-btn{background:var(--red);color:white;border:none;padding:14px 48px;border-radius:8px;font-size:16px;font-family:'Noto Serif SC',serif;font-weight:700;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 16px rgba(192,57,43,0.35);transition:all 0.2s;}
.submit-btn:hover{background:var(--red-deep);transform:translateY(-1px);}
.score-card{background:linear-gradient(135deg,var(--red-deep),var(--red));color:white;border-radius:14px;padding:28px;text-align:center;margin:24px 0;box-shadow:0 8px 32px rgba(192,57,43,0.3);display:none;}
.score-card.show{display:block;}
.score-num{font-family:'Noto Serif SC',serif;font-size:56px;font-weight:700;color:var(--gold);line-height:1;}
.score-label{font-size:16px;margin-top:6px;opacity:0.9;}
.score-detail{font-size:13px;margin-top:12px;opacity:0.75;}
.progress-bar{background:rgba(255,255,255,0.2);border-radius:4px;height:6px;margin-top:16px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.6s ease;}
body.mode-study .answer-box{display:block !important;}
body.mode-study .toggle-answer-btn{display:none !important;}
body.mode-study .submit-section{display:none !important;}
body.mode-study .score-card{display:none !important;}
body.mode-test .answer-box.hidden{display:none !important;}
body.mode-test .toggle-answer-btn{display:none !important;}
body.mode-test .toggle-answer-btn.fill-toggle{display:inline-block !important;}
.q-card.answered-correct{border-color:var(--correct);}
.q-card.answered-wrong{border-color:var(--wrong);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media (max-width:600px){.header-title{font-size:17px;}.mode-btn{padding:6px 14px;font-size:13px;}.tab-btn{padding:10px 14px;font-size:13px;}.q-text{font-size:14px;}.opt-label{font-size:13px;}}
</style>
</head>

", "党和人民需要", "群众信任"], "ans": 1, "analysis": "“党和人民需要”。"}, {"q": "党员违反民主集中制原则，（　　）党组织作出的重大决定的，给予警告或者严重警告处分。", "opts": ["严重阻碍", "阳奉阴违", "拒不执行或者擅自改变"], "ans": 2, "analysis": "“拒不执行或者擅自改变”。"}, {"q": "对于受到留党察看处分一年的党员，期满后仍不符合恢复党员权利条件的，应当（　　）。", "opts": ["延长一年留党察看期限", "延长二年留党察看期限", "开除党籍"], "ans": 0, "analysis": "留党察看期限最长不超过两年。"}]}, {"type": "multi", "title": "多选题", "questions": [{"q": "发展具有强大（　　）的新时代中国特色社会主义文化。", "opts": ["思想引领力", "精神凝聚力", "价值感召力", "国际影响力"], "ans": [0, 1, 2, 3], "analysis": "文化强国的建设目标。"}, {"q": "协同推进（　　）。", "opts": ["降碳", "减污", "扩绿", "增长"], "ans": [0, 1, 2, 3], "analysis": "“降碳、减污、扩绿、增长”。"}, {"q": "促进形成更多由（　　）的经济发展模式。", "opts": ["外需依赖", "内需主导", "消费拉动", "内生增长"], "ans": [1, 2, 3], "analysis": "内需主导、消费拉动和内生增长模式。"}, {"q": "强化（　　）和（　　）调节，实施更加积极的宏观政策。", "opts": ["逆周期", "跨周期", "顺周期", "短周期"], "ans": [0, 1], "analysis": "逆周期和跨周期调节。"}, {"q": "督促领导干部特别是高级干部（　　）。", "opts": ["严于律己", "严负其责", "严管所辖", "严于修身"], "ans": [0, 1, 2], "analysis": "严于律己、严负其责、严管所辖。"}, {"q": "深化整治（　　）领域的腐败。", "opts": ["重点行业", "权力集中", "资金密集", "资源富集"], "ans": [1, 2, 3], "analysis": "权力集中、资金密集、资源富集。"}, {"q": "坚持不敢腐、不能腐、不想腐一体推进，（　　）。", "opts": ["同时发力", "同向发力", "综合发力", "协同发力"], "ans": [0, 1, 2], "analysis": "“三不腐”必须同时发力、同向发力、综合发力。"}, {"q": "确保全党在（　　）上同党中央保持高度一致。", "opts": ["政治立场", "政治方向", "政治原则", "政治道路"], "ans": [0, 1, 2, 3], "analysis": "政治立场、方向、原则、道路。"}, {"q": "中国共产党关于正确处理党际关系的原则是（　　）。", "opts": ["独立自主", "完全平等", "互相尊重", "互不干涉内部事务"], "ans": [0, 1, 2, 3], "analysis": "四大基本原则。"}, {"q": "《中国共产党纪律处分条例》规定的六大纪律是（　　）。", "opts": ["政治纪律、组织纪律", "廉洁纪律、群众纪律", "工作纪律、生活纪律", "保密纪律、外事纪律"], "ans": [0, 1, 2], "analysis": "六大纪律不包括保密纪律和外事纪律。"}]}, {"type": "tf", "title": "判断题（选录）", "questions": [{"q": "到2035年基本实现社会主义现代化，人均国内生产总值达到中等发达国家水平。", "ans": true, "analysis": "党的二十届四中全会提出的目标。"}, {"q": "坚持把发展经济的着力点放在数字经济上。", "ans": false, "analysis": "错。着力点应放在“实体经济”上。"}, {"q": "发展是党执政兴国的第一要务，高质量发展是首要任务。", "ans": true, "analysis": "出自党的二十大报告。"}, {"q": "守正才能不迷失方向，创新才能把握时代。", "ans": true, "analysis": "“守正创新”是新时代的鲜明理论品格。"}, {"q": "党按照政绩突出的原则选拔干部。", "ans": false, "analysis": "错。按照“德才兼备、以德为先”的原则。"}, {"q": "坚持“惩前毖后、治病救人”，对党员违纪行为执纪必严、违纪必究。", "ans": true, "analysis": "基本方针，目的在于教育挽救。"}, {"q": "对留党察看处分一年期满仍不符合条件的，直接开除党籍。", "ans": false, "analysis": "错。应延长一年留党察看期限。"}, {"q": "中国共产党在党际关系上，坚持独立自主、完全平等、互相尊重、互不干涉内部事务的原则。", "ans": true, "analysis": "四大基本原则。"}]}]}]</script>
<script>
const EXAMS = JSON.parse(document.getElementById('exam-data').textContent);
let currentExam = 0;
let currentMode = 'study';
let testAnswers = {};

function setMode(m){
  currentMode = m;
  testAnswers = {};
  document.body.className = 'mode-' + m;
  document.getElementById('btnStudy').className = 'mode-btn' + (m==='study'?' active':'');
  document.getElementById('btnTest').className = 'mode-btn' + (m==='test'?' active':'');
  renderExam(currentExam);
}
function switchExam(idx){
  currentExam = idx;
  testAnswers = {};
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.className='tab-btn'+(i===idx?' active':''));
  renderExam(idx);
  window.scrollTo({top:0,behavior:'smooth'});
}
function escapeHTML(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderExam(idx){
  const exam = EXAMS[idx];
  const main = document.getElementById('mainContent');
  let html = '';
  exam.sections.forEach((sec, si)=>{
    html += '<div class="section-header"><div class="section-badge">'+sec.title+'</div></div>';
    sec.questions.forEach((q, qi)=>{
      html += renderQuestion(q, sec.type, 's'+si+'_q'+qi, qi);
    });
  });
  html += '<div class="submit-section"><button class="submit-btn" onclick="submitTest()">🏆 查看本套总成绩</button></div>';
  html += '<div class="score-card" id="scoreCard"></div>';
  main.innerHTML = html;
}

function renderQuestion(q, type, key, qi){
  const letters = ['A','B','C','D'];
  let inner = '';
  if(type === 'single'){
    let opts = '';
    q.opts.forEach((opt, oi)=>{
      opts += '<label class="opt-label" id="opt_'+key+'_'+oi+'">'
        + '<input type="radio" name="'+key+'" value="'+oi+'" onchange="setAnswer(\''+key+'\','+oi+')">'
        + '<span class="opt-key">'+letters[oi]+'.</span><span>'+escapeHTML(opt)+'</span></label>';
    });
    inner = '<div class="options">'+opts+'</div>';
  } else if(type === 'multi'){
    let opts = '';
    q.opts.forEach((opt, oi)=>{
      opts += '<label class="opt-label" id="opt_'+key+'_'+oi+'">'
        + '<input type="checkbox" value="'+oi+'" onchange="setMultiAnswer(\''+key+'\','+oi+')">'
        + '<span class="opt-key">'+letters[oi]+'.</span><span>'+escapeHTML(opt)+'</span></label>';
    });
    inner = '<div class="options">'+opts+'</div>';
  } else if(type === 'tf'){
    inner = '<div class="tf-options">'
      + '<button class="tf-btn" id="tf_'+key+'_t" onclick="setTFAnswer(\''+key+'\',true)">✓ 对</button>'
      + '<button class="tf-btn" id="tf_'+key+'_f" onclick="setTFAnswer(\''+key+'\',false)">✗ 错</button>'
      + '</div>';
  } else if(type === 'fill'){
    inner = '<textarea class="fill-input" id="fill_'+key+'" rows="2" placeholder="请输入答案..." oninput="setFillAnswer(\''+key+'\',this.value)"></textarea>';
  }

  let ansText = '';
  if(type === 'single'){
    ansText = '答案：<strong>'+letters[q.ans]+'</strong>（'+escapeHTML(q.opts[q.ans])+'）';
  } else if(type === 'multi'){
    ansText = '答案：<strong>'+q.ans.map(i=>letters[i]).join('、')+'</strong>（'+q.ans.map(i=>escapeHTML(q.opts[i])).join('；')+'）';
  } else if(type === 'tf'){
    ansText = '答案：<strong>'+(q.ans?'✓ 对':'✗ 错')+'</strong>';
  } else {
    ansText = '答案：'+escapeHTML(q.ans);
  }

  const answerBox = '<div class="answer-box hidden" id="ans_'+key+'">'
    + '<div class="answer-label">📋 参考答案</div>'
    + '<div class="answer-text">'+ansText+'</div>'
    + (q.analysis ? '<div class="analysis-text">💡 解析：'+escapeHTML(q.analysis)+'</div>' : '')
    + '</div>';

  // Fill questions need a manual reveal button (other types auto-reveal on click)
  const revealBtn = (type === 'fill')
    ? '<button class="toggle-answer-btn fill-toggle" onclick="toggleAnswer(\''+key+'\',this)">👁 查看参考答案</button>'
    : '';

  return '<div class="q-card" id="card_'+key+'">'
    + '<div class="q-num">第 '+(qi+1)+' 题</div>'
    + '<div class="q-text">'+escapeHTML(q.q)+'</div>'
    + inner + answerBox + revealBtn
    + '<div id="result_'+key+'"></div></div>';
}

function setAnswer(key, val){
  testAnswers[key] = val;
  if(currentMode === 'test') evaluateNow(key);
}
function setMultiAnswer(key, oi){
  if(!testAnswers[key]) testAnswers[key] = [];
  const idx = testAnswers[key].indexOf(oi);
  if(idx === -1) testAnswers[key].push(oi);
  else testAnswers[key].splice(idx, 1);
  testAnswers[key].sort();
  if(currentMode === 'test') evaluateNow(key);
}
function setTFAnswer(key, val){
  testAnswers[key] = val;
  if(currentMode === 'test'){
    evaluateNow(key);
  } else {
    document.getElementById('tf_'+key+'_t').className = 'tf-btn' + (val===true?' selected-t':'');
    document.getElementById('tf_'+key+'_f').className = 'tf-btn' + (val===false?' selected-f':'');
  }
}
function setFillAnswer(key, val){ testAnswers[key] = val; }

function toggleAnswer(key, btn){
  const box = document.getElementById('ans_'+key);
  if(!box) return;
  if(box.classList.contains('hidden')){
    box.classList.remove('hidden');
    if(btn) btn.textContent = '🙈 隐藏答案';
  } else {
    box.classList.add('hidden');
    if(btn) btn.textContent = '👁 查看参考答案';
  }
}

// helper: find section + question from key like 's0_q3'
function findQ(key){
  const m = key.match(/^s(\d+)_q(\d+)$/);
  const sec = EXAMS[currentExam].sections[+m[1]];
  return { sec: sec, q: sec.questions[+m[2]], type: sec.type };
}

// Immediate per-question feedback in test mode
function evaluateNow(key){
  const info = findQ(key);
  const q = info.q, type = info.type;
  const userAns = testAnswers[key];
  let isCorrect = false;
  let showFeedback = true;

  if(type === 'single'){
    isCorrect = userAns === q.ans;
    q.opts.forEach(function(_, oi){
      const el = document.getElementById('opt_'+key+'_'+oi);
      if(!el) return;
      el.classList.remove('correct','wrong');
      if(oi === q.ans) el.classList.add('correct');
      else if(oi === userAns) el.classList.add('wrong');
      // disable interaction once answered
      const input = el.querySelector('input');
      if(input) input.disabled = true;
      el.style.cursor = 'default';
    });
  } else if(type === 'tf'){
    isCorrect = userAns === q.ans;
    const t = document.getElementById('tf_'+key+'_t');
    const f = document.getElementById('tf_'+key+'_f');
    if(t){ t.className = 'tf-btn' + (q.ans===true?' correct':''); t.disabled = true; }
    if(f){ f.className = 'tf-btn' + (q.ans===false?' correct':''); f.disabled = true; }
    if(!isCorrect && userAns !== undefined){
      const wrongEl = document.getElementById('tf_'+key+'_'+(userAns?'t':'f'));
      if(wrongEl) wrongEl.className = 'tf-btn wrong-sel';
    }
  } else if(type === 'multi'){
    const ua = (userAns||[]).slice().sort();
    const ca = q.ans.slice().sort();
    // mark each option in real-time
    q.opts.forEach(function(_, oi){
      const el = document.getElementById('opt_'+key+'_'+oi);
      if(!el) return;
      el.classList.remove('correct','wrong');
      const isSelected = ua.indexOf(oi) !== -1;
      const isAnswer = ca.indexOf(oi) !== -1;
      if(isSelected && isAnswer) el.classList.add('correct');
      else if(isSelected && !isAnswer) el.classList.add('wrong');
    });
    const exactMatch = ua.length === ca.length && ua.every(function(v,i){return v===ca[i];});
    const hasWrongPick = ua.some(function(i){return ca.indexOf(i)===-1;});

    if(exactMatch){
      // perfect — lock and show
      isCorrect = true;
      q.opts.forEach(function(_, oi){
        const el = document.getElementById('opt_'+key+'_'+oi);
        if(el){
          const input = el.querySelector('input');
          if(input) input.disabled = true;
          el.style.cursor = 'default';
        }
      });
    } else if(hasWrongPick){
      // got at least one wrong — show as wrong
      isCorrect = false;
    } else {
      // partial — only correct ones picked, but not all yet
      showFeedback = false;
      const ansBox = document.getElementById('ans_'+key);
      if(ansBox) ansBox.classList.add('hidden');
      const resultEl = document.getElementById('result_'+key);
      if(resultEl){
        resultEl.innerHTML = ua.length === 0 ? '' :
          '<span style="color:var(--gold);font-size:13px;font-weight:600">⏳ 已选 '+ua.length+'/'+ca.length+' 项，继续选择...</span>';
      }
      const card = document.getElementById('card_'+key);
      if(card) card.classList.remove('answered-correct','answered-wrong');
      return;
    }
  } else {
    return; // fill: no auto evaluation
  }

  if(showFeedback){
    const ansBox = document.getElementById('ans_'+key);
    if(ansBox) ansBox.classList.remove('hidden');
    const resultEl = document.getElementById('result_'+key);
    if(resultEl){
      resultEl.innerHTML = isCorrect
        ? '<span class="result-mark" style="color:var(--correct)">✅</span><span style="color:var(--correct);font-size:14px;font-weight:700">回答正确！</span>'
        : '<span class="result-mark" style="color:var(--wrong)">❌</span><span style="color:var(--wrong);font-size:14px;font-weight:700">回答错误</span>';
    }
    const card = document.getElementById('card_'+key);
    if(card){
      card.classList.remove('answered-correct','answered-wrong');
      card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
    }
  }
}

function submitTest(){
  const exam = EXAMS[currentExam];
  let correct = 0, nonFillTotal = 0;

  exam.sections.forEach((sec, si)=>{
    sec.questions.forEach((q, qi)=>{
      const key = 's'+si+'_q'+qi;
      const userAns = testAnswers[key];
      let isCorrect = false;

      if(sec.type === 'single'){
        nonFillTotal++;
        isCorrect = (userAns === q.ans);
        q.opts.forEach((_, oi)=>{
          const el = document.getElementById('opt_'+key+'_'+oi);
          if(el){
            if(oi === q.ans) el.classList.add('correct');
            else if(oi === userAns && oi !== q.ans) el.classList.add('wrong');
          }
        });
      } else if(sec.type === 'multi'){
        nonFillTotal++;
        const ua = (userAns||[]).slice().sort();
        const ca = q.ans.slice().sort();
        isCorrect = JSON.stringify(ua) === JSON.stringify(ca);
        q.opts.forEach((_, oi)=>{
          const el = document.getElementById('opt_'+key+'_'+oi);
          if(el){
            if(q.ans.indexOf(oi) !== -1) el.classList.add('correct');
            else if((ua||[]).indexOf(oi) !== -1) el.classList.add('wrong');
          }
        });
      } else if(sec.type === 'tf'){
        nonFillTotal++;
        isCorrect = (userAns === q.ans);
        const t = document.getElementById('tf_'+key+'_t');
        const f = document.getElementById('tf_'+key+'_f');
        if(t) t.className = 'tf-btn' + (q.ans===true?' correct':'');
        if(f) f.className = 'tf-btn' + (q.ans===false?' correct':'');
        if(!isCorrect && userAns !== undefined){
          const wrongEl = document.getElementById('tf_'+key+'_'+(userAns?'t':'f'));
          if(wrongEl) wrongEl.className = 'tf-btn wrong-sel';
        }
      }

      const ansBox = document.getElementById('ans_'+key);
      if(ansBox){ ansBox.classList.remove('hidden'); }

      const resultEl = document.getElementById('result_'+key);
      const card = document.getElementById('card_'+key);
      if(resultEl){
        if(sec.type === 'fill'){
          resultEl.innerHTML = '';
        } else if(userAns === undefined || (Array.isArray(userAns) && userAns.length === 0)){
          resultEl.innerHTML = '<span style="color:var(--text-mute);font-size:13px">⚠️ 未作答</span>';
        } else {
          resultEl.innerHTML = isCorrect
            ? '<span class="result-mark" style="color:var(--correct)">✅</span><span style="color:var(--correct);font-size:14px;font-weight:700">回答正确！</span>'
            : '<span class="result-mark" style="color:var(--wrong)">❌</span><span style="color:var(--wrong);font-size:14px;font-weight:700">回答错误</span>';
        }
      }
      if(card && sec.type !== 'fill' && userAns !== undefined && !(Array.isArray(userAns) && userAns.length === 0)){
        card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
      }
      if(sec.type !== 'fill' && isCorrect) correct++;
    });
  });

  const pct = nonFillTotal > 0 ? Math.round(correct/nonFillTotal*100) : 0;
  const scoreCard = document.getElementById('scoreCard');
  scoreCard.className = 'score-card show';
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=60?'📚':'💪';
  scoreCard.innerHTML = '<div style="font-size:32px;margin-bottom:8px">'+emoji+'</div>'
    + '<div class="score-num">'+pct+'<span style="font-size:28px">分</span></div>'
    + '<div class="score-label">答对 '+correct+' 题 / 共 '+nonFillTotal+' 题（客观题）</div>'
    + '<div class="score-detail">填空题已展示答案，请自行对照</div>'
    + '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  scoreCard.scrollIntoView({behavior:'smooth'});
}

renderExam(0);
</script>
